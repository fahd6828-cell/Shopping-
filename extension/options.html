<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>إعدادات سوقلي</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main class="card">
    <h1>إعدادات سوقلي</h1>

    <label class="field">
      <span class="label">الدولة (لحساب الشحن والعملة)</span>
      <select id="country"></select>
    </label>

    <label class="field">
      <span class="label">عنوان الخادم (API)</span>
      <input id="apiBaseUrl" type="url" dir="ltr" placeholder="http://localhost:3000" />
      <span class="hint">اتركه كما هو إلا إذا كنت تشغّل خادمًا خاصًا.</span>
    </label>

    <button id="save">حفظ الإعدادات</button>
    <p id="status" class="status" role="status"></p>
  </main>

  <script type="module" src="options.js"></script>
</body>
</html>
