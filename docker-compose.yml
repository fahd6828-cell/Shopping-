# Default (`docker compose up -d`): infrastructure only — Postgres + Redis —
# for local development with `npm run dev`.
# Full stack (`docker compose --profile app up -d --build`): adds the API and
# the scrape/alert worker built from backend/Dockerfile. See docs/DEPLOYMENT.md.
services:
  api:
    build:
      context: ./backend
      target: api
    container_name: souqly-api
    profiles: ["app"]
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://souqly:souqly_dev@postgres:5432/souqly
      REDIS_URL: redis://redis:6379
      QUEUE_MODE: queue
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      target: worker
    container_name: souqly-worker
    profiles: ["app"]
    environment:
      DATABASE_URL: postgres://souqly:souqly_dev@postgres:5432/souqly
      REDIS_URL: redis://redis:6379
      QUEUE_MODE: queue
      # Flip to "true" (and provide proxies) to scrape real stores.
      SCRAPER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: souqly-postgres
    environment:
      POSTGRES_USER: souqly
      POSTGRES_PASSWORD: souqly_dev
      POSTGRES_DB: souqly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Applied automatically on first boot, in filename order.
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U souqly"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: souqly-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
